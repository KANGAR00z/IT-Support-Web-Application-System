<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FAST TICKET - แจ้งซ่อมไอที</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="config.js"></script>

  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
  </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden">

  <div class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-center z-10 shrink-0 shadow-sm">
    <div class="font-bold text-lg text-slate-800">แจ้งซ่อมใหม่ (FAST TICKET)</div>
  </div>

  <div class="flex-1 overflow-y-auto bg-slate-50 relative">
    
    <div id="loading" class="flex flex-col items-center justify-center p-10">
      <div class="w-8 h-8 border-4 border-[#00B900] border-t-transparent rounded-full animate-spin mb-3"></div>
      <p class="text-slate-500 text-sm">กำลังเชื่อมต่อ LINE...</p>
    </div>

    <div id="formContainer" class="hidden">
      
      <div class="bg-white p-5 mb-3 border-b border-slate-100 shadow-sm relative">
        <div class="flex justify-between items-start mb-3">
          <div class="flex items-center space-x-3">
            <div class="w-12 h-12 rounded-full bg-blue-100 border-2 border-white shadow-sm overflow-hidden flex items-center justify-center shrink-0">
              <img id="profileImage" src="" alt="Profile" class="w-full h-full object-cover hidden">
              <span id="profileFallback" class="text-blue-600 font-bold">U</span>
            </div>
            <div>
              <div class="font-bold text-slate-800 text-base">ข้อมูลผู้แจ้งซ่อม</div>
              <div class="text-xs text-slate-400">LINE: <span id="lineNameLabel">-</span></div>
            </div>
          </div>
          <button type="button" id="toggleEditBtn" class="p-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
            ✏️
          </button>
        </div>

        <div id="profileDisplayMode" class="bg-slate-50 rounded-xl p-3 border border-slate-100 text-sm block">
          <div class="grid grid-cols-3 gap-y-2">
            <div class="text-slate-500">ชื่อ-สกุล:</div>
            <div class="col-span-2 font-medium text-slate-800" id="dispName">-</div>
            <div class="text-slate-500">ตำแหน่ง:</div>
            <div class="col-span-2 text-slate-800" id="dispPosition">เจ้าหน้าที่ทั่วไป</div>
            <div class="text-slate-500">พื้นที่/สาขา:</div>
            <div class="col-span-2 text-slate-800 flex items-center">
              <span class="w-1.5 h-1.5 rounded-full bg-[#00B900] mr-2"></span>
              <span id="dispDept">สำนักงานสรรพสามิตภาคที่ 9</span>
            </div>
            <div class="text-slate-500">ส่วน/แผนก:</div>
            <div class="col-span-2 text-slate-800" id="dispDepartment">ส่วนอำนวยการ</div>
            <div class="text-slate-500">เบอร์ภายใน:</div>
            <div class="col-span-2 text-slate-800" id="dispPhone">-</div>
          </div>
        </div>

        <div id="profileEditMode" class="hidden grid-cols-1 gap-3 mt-2 animate-in fade-in">
          <input type="hidden" id="lineUserId">
          <div>
            <label class="text-xs font-medium text-slate-500">ชื่อจริง - นามสกุลจริง <span class="text-red-500">*</span></label>
            <input type="text" id="inputName" placeholder="เช่น สมชาย ใจดี (ห้ามใช้ชื่อ LINE)" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="text-xs font-medium text-slate-500">ตำแหน่ง</label>
            <input type="text" id="inputPosition" value="เจ้าหน้าที่ทั่วไป" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="text-xs font-medium text-slate-500">สาขา / พื้นที่ (Branch)</label>
            <select id="inputDept" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
              <option value="1" data-branch="1">สำนักงานสรรพสามิตภาคที่ 9</option>
              <optgroup label="1. พื้นที่สงขลา">
                <option value="2" data-branch="2">สาขาเมืองสงขลา</option>
                <option value="3" data-branch="2">สาขาหาดใหญ่</option>
                <option value="4" data-branch="2">สาขาสะเดา</option>
              </optgroup>
              <optgroup label="2. พื้นที่ตรัง">
                <option value="5" data-branch="3">สาขาเมืองตรัง</option>
                <option value="6" data-branch="3">สาขากันตัง</option>
              </optgroup>
              <optgroup label="3. พื้นที่นราธิวาส">
                <option value="7" data-branch="4">สาขาเมืองนราธิวาส</option>
                <option value="8" data-branch="4">สาขาระแงะ</option>
                <option value="9" data-branch="4">สาขาสุไหงโก-ลก</option>
              </optgroup>
              <optgroup label="4. พื้นที่ปัตตานี">
                <option value="10" data-branch="5">สาขาเมืองปัตตานี</option>
                <option value="11" data-branch="5">สาขามายอ</option>
              </optgroup>
              <optgroup label="5. พื้นที่ยะลา">
                <option value="12" data-branch="6">สาขาเมืองยะลา</option>
                <option value="13" data-branch="6">สาขาเบตง</option>
              </optgroup>
              <optgroup label="6. พื้นที่พัทลุง">
                <option value="14" data-branch="7">สาขาเมืองพัทลุง</option>
                <option value="15" data-branch="7">สาขาตะโหมด</option>
              </optgroup>
              <optgroup label="7. พื้นที่สตูล">
                <option value="16" data-branch="8">สาขาเมืองสตูล</option>
              </optgroup>
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-slate-500">ส่วน / แผนก (Department)</label>
            <select id="inputDepartment" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
              <option value="1">ส่วนอำนวยการ</option>
              <option value="2">ส่วนบริหารจัดเก็บภาษี</option>
              <option value="3">ส่วนตรวจสอบ ป้องกันและปราบปราม</option>
              <option value="4">ส่วนกฎหมาย</option>
              <option value="5">ส่วนเทคโนโลยีสารสนเทศ</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-medium text-slate-500">เบอร์โทรศัพท์ภายใน (ถ้ามี)</label>
            <input type="text" id="inputPhone" inputmode="tel" placeholder="เช่น 64305" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
        </div>
      </div>

      <form id="ticketForm" class="p-5 space-y-5">
        <div class="space-y-1.5">
          <label class="block text-sm font-bold text-slate-700">เลขครุภัณฑ์ / รหัสเครื่อง (ถ้ามี)</label>
          <input type="text" id="assetId" placeholder="เช่น PC-2023-001" class="w-full bg-white border border-slate-300 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm">
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-bold text-slate-700">หมวดหมู่ปัญหา <span class="text-red-500">*</span></label>
          <select id="category" required class="w-full bg-white border border-slate-300 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm">
            <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
            <option value="1">💻 ฮาร์ดแวร์ (Hardware)</option>
            <option value="2">💿 ซอฟต์แวร์ (Software)</option>
            <option value="3">🌐 เครือข่าย (Network)</option>
            <option value="4">❓ อื่นๆ (Others)</option>
          </select>
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-bold text-slate-700">รายละเอียดอาการเสีย <span class="text-red-500">*</span></label>
          <textarea id="description" required placeholder="อธิบายอาการที่พบ เช่น เปิดคอมไม่ติด หน้าจอกระพริบ..." class="w-full bg-white border border-slate-300 text-slate-800 rounded-xl px-4 py-3 h-28 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm"></textarea>
        </div>
        
        <div class="h-4"></div>
      </form>
    </div>
  </div>

  <div class="bg-white border-t border-slate-100 p-4 shrink-0 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] relative z-30 flex gap-3">
    <button id="previewBtn" type="button" class="w-1/2 bg-blue-100 text-blue-600 hover:bg-blue-200 font-bold text-lg py-3.5 rounded-xl transition-all flex items-center justify-center">
      📄 ดูเอกสาร
    </button>
    <button id="submitBtn" disabled class="w-1/2 bg-slate-300 text-white font-bold text-lg py-3.5 rounded-xl transition-all flex items-center justify-center">
      กำลังเตรียม...
    </button>
  </div>
  
  <div class="text-center pb-3 bg-white relative z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.02)]">
    <button onclick="toggleDebug()" class="text-[11px] font-medium text-slate-500 hover:text-slate-700 transition-colors inline-flex items-center gap-1.5 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
      <span id="debugText">เปิด Debug Mode</span>
      <span id="debugArrow" class="transition-transform duration-300">🔼</span>
    </button>
  </div>

  <div id="debugContainer" class="fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-md z-50 transition-transform duration-300 ease-in-out translate-y-full rounded-t-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.3)] border-t border-slate-700 flex flex-col">
    <div class="flex justify-between items-center px-4 py-2 border-b border-slate-800 shrink-0">
      <span class="text-green-500 font-mono text-xs font-bold flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Terminal Logs
      </span>
      <button onclick="toggleDebug()" class="text-slate-400 hover:text-white text-xl leading-none px-2">&times;</button>
    </div>
    <div id="debugConsole" class="text-green-400 font-mono text-[10px] p-4 h-48 overflow-y-auto w-full"></div>
  </div>

  <div id="previewScreen" class="hidden fixed inset-0 z-[100] bg-slate-100 flex flex-col h-[100dvh]">
    <div class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shadow-sm shrink-0">
      <div class="font-bold text-lg text-slate-800 flex items-center gap-2">
        <span>📄 ตรวจสอบเอกสารก่อนส่ง</span>
      </div>
      <button id="closePreviewBtn" class="text-slate-400 hover:text-slate-600 text-2xl font-bold leading-none px-2">&times;</button>
    </div>
    
    <div class="flex-1 p-0 md:p-2 overflow-hidden relative bg-slate-200">
      <div id="pdfLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-100 z-10">
        <div class="w-8 h-8 border-4 border-red-500 border-t-transparent rounded-full animate-spin mb-3"></div>
        <p class="text-slate-500 text-sm">กำลังโหลดเอกสาร...</p>
      </div>
      <iframe id="pdfIframe" class="w-full h-full md:rounded-lg bg-white" src="" onload="document.getElementById('pdfLoading').classList.add('hidden')"></iframe>
    </div>

    <div class="bg-white border-t border-slate-200 p-4 shrink-0 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] flex flex-col gap-3">
      <button id="downloadPdfBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-base py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-md shadow-blue-500/30">
        ⬇️ ดาวน์โหลด PDF เก็บไว้
      </button>
      <div class="flex gap-3">
        <button id="backToEditBtn" class="w-1/2 bg-slate-100 text-slate-600 border border-slate-300 font-bold text-base py-3.5 rounded-xl transition-all">
          ✏️ กลับไปแก้ไข
        </button>
        <button id="confirmFromPreviewBtn" class="w-1/2 bg-[#00B900] hover:bg-[#009900] text-white font-bold text-base py-3.5 rounded-xl transition-all shadow-lg shadow-green-500/30">
          ✅ ยืนยันแจ้งซ่อม
        </button>
      </div>
    </div>
  </div>

  <script>
    // ---------- Helpers ----------
    const $ = (id) => document.getElementById(id);

    // ---------- State ----------
    let currentTicketPayload = null;   // payload สำหรับ createTicket (เก็บ docPdfUrl ที่สร้างแล้ว)
    let isEditingProfile = false;
    let isDebugOpen = false;
    let lineDisplayName = "";           // ชื่อ LINE ปัจจุบัน (ใช้ตรวจว่าห้ามกรอกชื่อจริงซ้ำ)

    // ---------- Debug console ----------
    function logDebug(msg) {
      const consoleDiv = $('debugConsole');
      consoleDiv.innerHTML += `<div>> ${msg}</div>`;
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function toggleDebug() {
      isDebugOpen = !isDebugOpen;
      const container = $('debugContainer');
      container.classList.toggle('translate-y-full', !isDebugOpen);
      container.classList.toggle('translate-y-0', isDebugOpen);
      $('debugArrow').style.transform = isDebugOpen ? 'rotate(180deg)' : 'rotate(0deg)';
      $('debugText').innerText = isDebugOpen ? 'ปิด Debug Mode' : 'เปิด Debug Mode';
    }

    // ---------- Profile edit toggle ----------
    $("toggleEditBtn").addEventListener("click", () => {
      isEditingProfile = !isEditingProfile;
      if (isEditingProfile) {
        $("profileDisplayMode").classList.replace("block", "hidden");
        $("profileEditMode").classList.replace("hidden", "grid");
        $("toggleEditBtn").innerHTML = "💾";
      } else {
        const deptSelect = $("inputDept");
        const departmentSelect = $("inputDepartment");
        $("dispName").innerText = $("inputName").value;
        $("dispPosition").innerText = $("inputPosition").value;
        $("dispDept").innerText = deptSelect.options[deptSelect.selectedIndex].text;
        $("dispDepartment").innerText = departmentSelect.options[departmentSelect.selectedIndex].text;
        $("dispPhone").innerText = $("inputPhone").value.trim() || "-";
        $("profileEditMode").classList.replace("grid", "hidden");
        $("profileDisplayMode").classList.replace("hidden", "block");
        $("toggleEditBtn").innerHTML = "✏️";
      }
    });

    // ---------- Init (LIFF) ----------
    async function initApp() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        lineDisplayName = profile.displayName;
        $("lineNameLabel").innerText = profile.displayName;
        $("lineUserId").value = profile.userId;
        // ไม่เติมชื่อ LINE ลงช่องชื่อจริง — บังคับให้ผู้ใช้กรอกชื่อ-นามสกุลจริงเอง
        $("dispName").innerHTML = '<span class="text-red-500">— กรุณากรอกชื่อจริง-นามสกุลจริง —</span>';

        if (profile.pictureUrl) {
          const img = $("profileImage");
          img.src = profile.pictureUrl;
          img.classList.remove("hidden");
          $("profileFallback").classList.add("hidden");
        }

        $("loading").classList.add("hidden");
        $("formContainer").classList.remove("hidden");

        const btn = $("submitBtn");
        btn.disabled = false;
        btn.innerText = "ยืนยันแจ้งซ่อม";
        btn.className = "w-1/2 bg-[#00B900] hover:bg-[#009900] text-white font-bold text-lg py-3.5 rounded-xl shadow-lg shadow-green-500/30 transition-all flex items-center justify-center";
      } catch (error) {
        logDebug("ERROR: " + error.message);
        alert("LIFF Error: " + error.message);
      }
    }

    // ---------- Backend ----------
    async function callBackend(actionName, payloadData) {
      logDebug("Sending payload to " + actionName);
      const response = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: actionName, data: payloadData })
      });
      return await response.json();
    }

    // ---------- Form data collectors ----------
    // ข้อมูลแบบ label (ข้อความ) สำหรับสร้างเอกสาร PDF
    // ลบ emoji ออกจากข้อความ (เอกสารราชการห้ามมี emoji)
    function stripEmoji(s) {
      return String(s)
        .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}\u{FE00}-\u{FE0F}\u{200D}]/gu, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    // ทำความสะอาดหมวดหมู่: ตัด emoji + วงเล็บภาษาอังกฤษ เช่น "💻 ฮาร์ดแวร์ (Hardware)" -> "ฮาร์ดแวร์"
    function cleanCategory(s) {
      return stripEmoji(s).replace(/\s*\([A-Za-z\s]+\)\s*/g, '').trim();
    }

    // ชื่อเต็มทางการของสาขา: ประกอบจาก optgroup (พื้นที่) + ข้อความ option
    // เช่น optgroup "5. พื้นที่ยะลา" + "สาขาเบตง" -> "สำนักงานสรรพสามิตพื้นที่ยะลา สาขาเบตง"
    function fullBranchName(optionEl) {
      const grp = optionEl.parentElement;
      if (grp && grp.tagName === 'OPTGROUP') {
        const area = grp.label.replace(/^\s*\d+\.\s*พื้นที่\s*/, '').trim();
        return 'สำนักงานสรรพสามิตพื้นที่' + area + ' ' + optionEl.text;
      }
      return optionEl.text; // สำนักงานสรรพสามิตภาคที่ 9 (เป็นชื่อเต็มอยู่แล้ว)
    }

    function collectDocumentData() {
      const deptSelect = $("inputDept");
      const departmentSelect = $("inputDepartment");
      const categorySelect = $("category");
      const branchFull = fullBranchName(deptSelect.options[deptSelect.selectedIndex]);      // ชื่อเต็มสาขา (BRANCH)
      const departmentText = departmentSelect.options[departmentSelect.selectedIndex].text; // ส่วน (DEPARTMENT)
      return {
        name: $("inputName").value,
        position: $("inputPosition").value,
        // ส่วนราชการ ในบันทึกข้อความ = ชื่อเต็มสาขา + ส่วน
        department: branchFull + ' ' + departmentText,
        phone: $("inputPhone").value.trim() || '-', // เบอร์โทรศัพท์ภายใน (แทนที่ - หลังโทร.)
        asset_id: $("assetId").value.trim(),
        problem_type: cleanCategory(categorySelect.options[categorySelect.selectedIndex].text), // ตัด emoji + (English)
        description: $("description").value.trim()
      };
    }

    // payload แบบ id สำหรับบันทึกลงฐานข้อมูล (createTicket)
    function buildTicketPayload() {
      const deptSelect = $("inputDept");
      const deptOption = deptSelect.options[deptSelect.selectedIndex];
      const assetId = $("assetId").value.trim();
      const desc = $("description").value.trim();
      return {
        lineUserId: $("lineUserId").value,
        displayName: $("inputName").value,
        position: $("inputPosition").value,
        deptId: parseInt(deptSelect.value),
        branchId: parseInt(deptOption.getAttribute("data-branch")),
        departmentId: parseInt($("inputDepartment").value), // ส่วน 1-5 (backend เพิ่มคอลัมน์รองรับภายหลัง)
        categoryId: parseInt($("category").value),
        issueDetail: assetId ? `[${assetId}] ${desc}` : desc,
        imageUrl: null,
        docPdfUrl: null
      };
    }

    // ---------- ตรวจสอบชื่อผู้แจ้ง (บังคับชื่อจริง ห้ามซ้ำชื่อ LINE) ----------
    function openProfileEdit() {
      if (!isEditingProfile) $("toggleEditBtn").click();
      $("inputName").focus();
    }

    function validateReporterName() {
      const name = $("inputName").value.trim();
      if (!name) {
        alert("กรุณากรอกชื่อจริง-นามสกุลจริงของผู้แจ้งซ่อม");
        openProfileEdit();
        return false;
      }
      if (name.split(/\s+/).length < 2) {
        alert("กรุณากรอกทั้งชื่อจริงและนามสกุลจริง");
        openProfileEdit();
        return false;
      }
      if (name.toLowerCase() === lineDisplayName.trim().toLowerCase()) {
        alert("กรุณาใช้ชื่อจริง-นามสกุลจริง (ห้ามใช้ชื่อ LINE)");
        openProfileEdit();
        return false;
      }
      return true;
    }

    // ---------- Preview (ดูเอกสาร) ----------
    $("previewBtn").addEventListener("click", async function () {
      const form = $("ticketForm");
      if (!form.checkValidity()) { form.reportValidity(); return; }
      if (!validateReporterName()) return;
      if (isEditingProfile) $("toggleEditBtn").click();

      currentTicketPayload = buildTicketPayload();

      const btn = this;
      const originalText = btn.innerHTML;
      btn.innerHTML = "⏳ กำลังสร้าง...";
      btn.disabled = true;
      $("submitBtn").disabled = true;

      try {
        const response = await callBackend("generateDocument", collectDocumentData());
        if (response.status === 'success') {
          currentTicketPayload.docPdfUrl = response.url;
          const previewUrl = response.url
            .replace('/view?usp=drivesdk', '/preview')
            .replace('/view', '/preview');

          $('pdfLoading').classList.remove('hidden');
          $('pdfIframe').src = previewUrl;
          $('previewScreen').classList.remove('hidden');
        } else {
          alert("เกิดข้อผิดพลาดในการสร้างเอกสาร: " + response.message);
        }
      } catch (error) {
        alert("ติดต่อเซิร์ฟเวอร์ล้มเหลว: " + error.message);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
        $("submitBtn").disabled = false;
      }
    });

    // ---------- Close preview ----------
    // ซ่อนหน้าพรีวิวอย่างเดียว (ใช้หลัง submit สำเร็จ — PDF ถูกผูกกับ ticket แล้ว ห้ามลบ)
    function hidePreview() {
      $('previewScreen').classList.add('hidden');
      $('pdfIframe').src = "";
    }

    // ยกเลิกพรีวิว: ปิดหน้า -> ลบ PDF ชั่วคราวทิ้งจาก Drive -> เคลียร์ payload
    // (ถ้าผู้ใช้ไปกดยืนยันที่หน้าหลักภายหลัง ระบบจะสร้างเอกสารใหม่)
    function cancelPreview() {
      const tempUrl = currentTicketPayload && currentTicketPayload.docPdfUrl;
      hidePreview();
      currentTicketPayload = null;
      if (tempUrl) {
        // ลบแบบ fire-and-forget ไม่ให้ค้างหน้าจอ
        callBackend("deleteTempPdf", { url: tempUrl })
          .then(() => logDebug("Temp PDF deleted"))
          .catch((e) => logDebug("deleteTempPdf failed: " + e.message));
      }
    }
    $("backToEditBtn").addEventListener("click", cancelPreview);
    $("closePreviewBtn").addEventListener("click", cancelPreview);

    // ---------- Download PDF (เซฟลงเครื่องผู้ใช้) ----------
    $("downloadPdfBtn").addEventListener("click", function () {
      const url = currentTicketPayload && currentTicketPayload.docPdfUrl;
      if (!url) { alert("ยังไม่มีเอกสารให้ดาวน์โหลด"); return; }
      const match = url.match(/[-\w]{25,}/); // ดึง File ID จาก URL
      if (!match) { alert("ไม่พบไฟล์เอกสาร"); return; }
      const downloadUrl = "https://drive.google.com/uc?export=download&id=" + match[0];
      // ใน LINE ให้เปิดเบราว์เซอร์ภายนอกเพื่อให้ดาวน์โหลดได้ (in-app browser บล็อกการเซฟไฟล์)
      if (typeof liff !== 'undefined' && liff.isInClient()) {
        liff.openWindow({ url: downloadUrl, external: true });
      } else {
        window.open(downloadUrl, "_blank");
      }
    });

    // ---------- Submit (ยืนยันแจ้งซ่อม) ----------
    async function executeSubmit(btnElement) {
      const form = $("ticketForm");
      if (!form.checkValidity()) { form.reportValidity(); return; }
      if (!validateReporterName()) return;

      // บังคับตรวจสอบเอกสารก่อนยืนยัน — ถ้ายังไม่มี PDF ที่พรีวิวแล้ว ให้เปิดหน้าพรีวิวก่อน
      if (!currentTicketPayload || !currentTicketPayload.docPdfUrl) {
        alert('กรุณากดปุ่ม "📄 ดูเอกสาร" เพื่อตรวจสอบเอกสารก่อนยืนยันแจ้งซ่อม');
        $("previewBtn").click();
        return;
      }

      const originalText = btnElement.innerHTML;
      btnElement.disabled = true;
      btnElement.innerHTML = "⏳ กำลังบันทึก...";

      try {
        const response = await callBackend("createTicket", currentTicketPayload);
        if (response.status === 'success') {
          alert(`✅ แจ้งซ่อมสำเร็จ!\nรหัสอ้างอิงของคุณคือ: TK-${response.ticketId}`);
          form.reset();
          currentTicketPayload = null;
          hidePreview();
          if (typeof liff !== 'undefined' && liff.isInClient()) { liff.closeWindow(); }
        } else {
          alert("❌ แจ้งซ่อมไม่สำเร็จ: " + response.message);
        }
      } catch (error) {
        alert("❌ ติดต่อเซิร์ฟเวอร์ไม่ได้");
      } finally {
        btnElement.disabled = false;
        btnElement.innerHTML = originalText;
      }
    }

    $("confirmFromPreviewBtn").addEventListener("click", function () { executeSubmit(this); });
    $("submitBtn").addEventListener("click", function () { executeSubmit(this); });

    initApp();
  </script>
</body>
</html>
