<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FAST TICKET - แจ้งซ่อมไอที</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="config.js"></script>

  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
  </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden">

  <div class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-center z-10 shrink-0 shadow-sm">
    <div class="font-bold text-lg text-slate-800">แจ้งซ่อมใหม่ (FAST TICKET)</div>
  </div>

  <div class="flex-1 overflow-y-auto bg-slate-50 relative">
    
    <div id="loading" class="flex flex-col items-center justify-center p-10">
      <div class="w-8 h-8 border-4 border-[#00B900] border-t-transparent rounded-full animate-spin mb-3"></div>
      <p class="text-slate-500 text-sm">กำลังเชื่อมต่อ LINE...</p>
    </div>

    <div id="formContainer" class="hidden">
      
      <div class="bg-white p-5 mb-3 border-b border-slate-100 shadow-sm relative">
        <div class="flex justify-between items-start mb-3">
          <div class="flex items-center space-x-3">
            <div class="w-12 h-12 rounded-full bg-blue-100 border-2 border-white shadow-sm overflow-hidden flex items-center justify-center shrink-0">
              <img id="profileImage" src="" alt="Profile" class="w-full h-full object-cover hidden">
              <span id="profileFallback" class="text-blue-600 font-bold">U</span>
            </div>
            <div class="font-bold text-slate-800 text-base">ข้อมูลผู้แจ้งซ่อม</div>
          </div>
          <button type="button" id="toggleEditBtn" class="p-2 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
            ✏️
          </button>
        </div>

        <div id="profileDisplayMode" class="bg-slate-50 rounded-xl p-3 border border-slate-100 text-sm block">
          <div class="grid grid-cols-3 gap-y-2">
            <div class="text-slate-500">ชื่อ-สกุล:</div>
            <div class="col-span-2 font-medium text-slate-800" id="dispName">-</div>
            <div class="text-slate-500">ตำแหน่ง:</div>
            <div class="col-span-2 text-slate-800" id="dispPosition">เจ้าหน้าที่ทั่วไป</div>
            <div class="text-slate-500">สังกัด:</div>
            <div class="col-span-2 text-slate-800 flex items-center">
              <span class="w-1.5 h-1.5 rounded-full bg-[#00B900] mr-2"></span>
              <span id="dispDept">สำนักงานสรรพสามิตภาคที่ 9</span>
            </div>
          </div>
        </div>

        <div id="profileEditMode" class="hidden grid-cols-1 gap-3 mt-2 animate-in fade-in">
          <input type="hidden" id="lineUserId">
          <div>
            <label class="text-xs font-medium text-slate-500">ชื่อ-นามสกุล</label>
            <input type="text" id="inputName" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="text-xs font-medium text-slate-500">ตำแหน่ง</label>
            <input type="text" id="inputPosition" value="เจ้าหน้าที่ทั่วไป" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
          </div>
          <div>
            <label class="text-xs font-medium text-slate-500">พื้นที่สังกัด / สาขา</label>
            <select id="inputDept" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
              <option value="1" data-branch="1">สำนักงานสรรพสามิตภาคที่ 9</option>
              
              <optgroup label="1. พื้นที่สงขลา">
                <option value="2" data-branch="2">สาขาเมืองสงขลา</option>
                <option value="3" data-branch="2">สาขาหาดใหญ่</option>
                <option value="4" data-branch="2">สาขาสะเดา</option>
              </optgroup>
              
              <optgroup label="2. พื้นที่ตรัง">
                <option value="5" data-branch="3">สาขาเมืองตรัง</option>
                <option value="6" data-branch="3">สาขากันตัง</option>
              </optgroup>
              
              <optgroup label="3. พื้นที่นราธิวาส">
                <option value="7" data-branch="4">สาขาเมืองนราธิวาส</option>
                <option value="8" data-branch="4">สาขาระแงะ</option>
                <option value="9" data-branch="4">สาขาสุไหงโก-ลก</option>
              </optgroup>

              <optgroup label="4. พื้นที่ปัตตานี">
                <option value="10" data-branch="5">สาขาเมืองปัตตานี</option>
                <option value="11" data-branch="5">สาขามายอ</option>
              </optgroup>

              <optgroup label="5. พื้นที่ยะลา">
                <option value="12" data-branch="6">สาขาเมืองยะลา</option>
                <option value="13" data-branch="6">สาขาเบตง</option>
              </optgroup>

              <optgroup label="6. พื้นที่พัทลุง">
                <option value="14" data-branch="7">สาขาเมืองพัทลุง</option>
                <option value="15" data-branch="7">สาขาตะโหมด</option>
              </optgroup>

              <optgroup label="7. พื้นที่สตูล">
                <option value="16" data-branch="8">สาขาเมืองสตูล</option>
              </optgroup>
            </select>
          </div>
        </div>
      </div>

      <form id="ticketForm" class="p-5 space-y-5">
        <div class="space-y-1.5">
          <label class="block text-sm font-bold text-slate-700">เลขครุภัณฑ์ / รหัสเครื่อง (ถ้ามี)</label>
          <input type="text" id="assetId" placeholder="เช่น PC-2023-001" class="w-full bg-white border border-slate-300 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm">
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-bold text-slate-700">หมวดหมู่ปัญหา <span class="text-red-500">*</span></label>
          <select id="category" required class="w-full bg-white border border-slate-300 text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm">
            <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
            <option value="1">💻 ฮาร์ดแวร์ (Hardware)</option>
            <option value="2">💿 ซอฟต์แวร์ (Software)</option>
            <option value="3">🌐 เครือข่าย (Network)</option>
            <option value="4">❓ อื่นๆ (Others)</option>
          </select>
        </div>

        <div class="space-y-1.5">
          <label class="block text-sm font-bold text-slate-700">รายละเอียดอาการเสีย <span class="text-red-500">*</span></label>
          <textarea id="description" required placeholder="อธิบายอาการที่พบ เช่น เปิดคอมไม่ติด หน้าจอกระพริบ..." class="w-full bg-white border border-slate-300 text-slate-800 rounded-xl px-4 py-3 h-28 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm"></textarea>
        </div>
        
        <div class="h-4"></div>
      </form>
    </div>
  </div>

  <div class="bg-white border-t border-slate-100 p-4 shrink-0 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] relative z-30">
    <button id="submitBtn" disabled class="w-full bg-slate-300 text-white font-bold text-lg py-3.5 rounded-xl transition-all flex items-center justify-center">
      กำลังเตรียมระบบ...
    </button>
  </div>

  <div class="text-center pb-3 bg-white relative z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.02)]">
    <button onclick="toggleDebug()" class="text-[11px] font-medium text-slate-500 hover:text-slate-700 transition-colors inline-flex items-center gap-1.5 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
      <span id="debugText">เปิด Debug Mode</span>
      <span id="debugArrow" class="transition-transform duration-300">🔼</span>
    </button>
  </div>

  <div id="debugContainer" class="fixed bottom-0 left-0 w-full bg-black/95 backdrop-blur-md z-50 transition-transform duration-300 ease-in-out translate-y-full rounded-t-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.3)] border-t border-slate-700 flex flex-col">
    <div class="flex justify-between items-center px-4 py-2 border-b border-slate-800 shrink-0">
      <span class="text-green-500 font-mono text-xs font-bold flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Terminal Logs
      </span>
      <button onclick="toggleDebug()" class="text-slate-400 hover:text-white text-xl leading-none px-2">&times;</button>
    </div>
    <div id="debugConsole" class="text-green-400 font-mono text-[10px] p-4 h-48 overflow-y-auto w-full"></div>
  </div>

  <script>
    // ฟังก์ชันเขียน Log
    function logDebug(msg) {
      document.getElementById('debugConsole').innerHTML += `<div>> ${msg}</div>`;
      // เลื่อน Scrollbar ลงมาล่างสุดอัตโนมัติเมื่อมีข้อความใหม่
      const consoleDiv = document.getElementById('debugConsole');
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // ฟังก์ชันเปิด-ปิดหน้าต่าง Debug
    let isDebugOpen = false;
    function toggleDebug() {
      isDebugOpen = !isDebugOpen;
      const container = document.getElementById('debugContainer');
      const arrow = document.getElementById('debugArrow');
      const text = document.getElementById('debugText');
      
      if (isDebugOpen) {
        container.classList.remove('translate-y-full');
        container.classList.add('translate-y-0');
        arrow.style.transform = 'rotate(180deg)';
        text.innerText = 'ปิด Debug Mode';
      } else {
        container.classList.remove('translate-y-0');
        container.classList.add('translate-y-full');
        arrow.style.transform = 'rotate(0deg)';
        text.innerText = 'เปิด Debug Mode';
      }
    }

    // สลับโหมดแก้ไขโปรไฟล์
    let isEditingProfile = false;
    document.getElementById("toggleEditBtn").addEventListener("click", () => {
      isEditingProfile = !isEditingProfile;
      if(isEditingProfile) {
        document.getElementById("profileDisplayMode").classList.replace("block", "hidden");
        document.getElementById("profileEditMode").classList.replace("hidden", "grid");
        document.getElementById("toggleEditBtn").innerHTML = "💾";
      } else {
        // อัปเดตข้อมูลกลับไปหน้าแสดงผล
        document.getElementById("dispName").innerText = document.getElementById("inputName").value;
        document.getElementById("dispPosition").innerText = document.getElementById("inputPosition").value;
        const deptSelect = document.getElementById("inputDept");
        document.getElementById("dispDept").innerText = deptSelect.options[deptSelect.selectedIndex].text;
        
        document.getElementById("profileEditMode").classList.replace("grid", "hidden");
        document.getElementById("profileDisplayMode").classList.replace("hidden", "block");
        document.getElementById("toggleEditBtn").innerHTML = "✏️";
      }
    });

    // 1. เริ่มต้นระบบ LIFF
    async function initApp() {
      try {
        await liff.init({ liffId: MY_LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        
        // ตั้งค่าข้อมูลเริ่มต้นให้ผู้ใช้
        document.getElementById("inputName").value = profile.displayName;
        document.getElementById("dispName").innerText = profile.displayName;
        document.getElementById("lineUserId").value = profile.userId;
        
        if (profile.pictureUrl) {
          const img = document.getElementById("profileImage");
          img.src = profile.pictureUrl;
          img.classList.remove("hidden");
          document.getElementById("profileFallback").classList.add("hidden");
        }

        // โหลดเสร็จ เปิดหน้าฟอร์ม
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("formContainer").classList.remove("hidden");

        const btn = document.getElementById("submitBtn");
        btn.disabled = false;
        btn.innerText = "ยืนยันแจ้งซ่อม";
        btn.className = "w-full bg-[#00B900] hover:bg-[#009900] text-white font-bold text-lg py-3.5 rounded-xl shadow-lg shadow-green-500/30 transition-all flex items-center justify-center";

      } catch (error) {
        logDebug("ERROR: " + error.message);
        alert("LIFF Error: " + error.message);
      }
    }

    // 2. จัดการส่งฟอร์ม (ยิง API แบบข้อความธรรมดา หลบ CORS)
    document.getElementById("submitBtn").addEventListener("click", function() {
      if (!document.getElementById("ticketForm").checkValidity()) {
        document.getElementById("ticketForm").reportValidity();
        return;
      }

      // บังคับเซฟโปรไฟล์ถ้ายังเปิดโหมดแก้ไขค้างไว้
      if(isEditingProfile) document.getElementById("toggleEditBtn").click();

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerText = "⏳ กำลังส่งข้อมูล...";
      btn.classList.replace("bg-[#00B900]", "bg-slate-400");

      const deptSelect = document.getElementById("inputDept");
      const selectedOption = deptSelect.options[deptSelect.selectedIndex];

      // รวบรวมข้อมูล Asset ID และ Description เข้าด้วยกันใน Issue Detail
      const assetIdVal = document.getElementById("assetId").value.trim();
      const descVal = document.getElementById("description").value.trim();
      const finalIssueDetail = assetIdVal ? `[${assetIdVal}] ${descVal}` : descVal;

      const payload = {
        action: "createTicket",
        data: {
          lineUserId: document.getElementById("lineUserId").value,
          displayName: document.getElementById("inputName").value, 
          position: document.getElementById("inputPosition").value, 
          deptId: parseInt(selectedOption.value), 
          branchId: parseInt(selectedOption.getAttribute("data-branch")), 
          categoryId: parseInt(document.getElementById("category").value),
          issueDetail: finalIssueDetail, // ใส่ข้อมูลที่มัดรวมกันแล้ว
          imageUrl: null,
          docPdfUrl: null
        }
      };

      logDebug("Sending payload: " + JSON.stringify(payload));

      // ใช้วิธี POST แบบข้อความธรรมดา หลบการตรวจจับ Preflight (CORS) ของเบราว์เซอร์
      // 🌟 ท่าไม้ตาย: แปลงข้อมูลทั้งหมดแปะไปกับ URL (GET Request)
      const urlParams = new URLSearchParams({
        action: 'createTicket',
        data: JSON.stringify(payload.data)
      });
      const finalUrl = GAS_API_URL + '?' + urlParams.toString();

      logDebug("Sending GET request to: " + finalUrl);

      // ส่งออกแบบ GET ซึ่งเบราว์เซอร์จะไม่บล็อก CORS แน่นอน
      fetch(finalUrl, {
        method: 'GET'
      })
      .then(res => res.json())
      .then(data => {
        logDebug("Response: " + JSON.stringify(data));
        if(data.status === 'success') {
          alert(`✅ แจ้งซ่อมสำเร็จ!\nรหัสอ้างอิงของคุณคือ: TK-${data.ticketId}`);
          liff.closeWindow(); 
        } else {
          alert("❌ แจ้งซ่อมไม่สำเร็จ: " + data.message);
        }
      })
      .catch(err => {
        alert("❌ ติดต่อเซิร์ฟเวอร์ไม่ได้ ดู Log นะครับ");
        logDebug("API Error: " + err);
      })
      .finally(() => {
        btn.disabled = false;
        btn.innerText = "ยืนยันแจ้งซ่อม";
        btn.classList.replace("bg-slate-400", "bg-[#00B900]");
      });
    });

    // เริ่มต้นแอป
    initApp();
  </script>
</body>
</html>
